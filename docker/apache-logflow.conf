# LogFlow — réglages Apache (chargés via conf-enabled)
<Directory /var/www/html>
    AllowOverride All
    Require all granted
</Directory>

# Le dossier des includes PHP ne doit jamais être servi directement
<Directory /var/www/html/includes>
    Require all denied
</Directory>

# Idem pour les fichiers de migration SQL (aucun contenu à servir)
<Directory /var/www/html/migrations>
    Require all denied
</Directory>
